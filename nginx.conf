server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip text assets on the fly
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Hashed build assets are immutable — cache them hard.
    # try_files ... =404 ensures a missing asset returns a real 404
    # instead of falling back to index.html (which would re-trigger the
    # "expected a JavaScript module, got text/html" error).
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback: serve index.html for client-side (TanStack Router) routes.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
